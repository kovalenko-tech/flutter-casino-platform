name: flutter_casino_platform
description: "A local-first Flutter casino platform with clean architecture and Isar DB."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  intl: ^0.19.0

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Dependency injection
  get_it: ^7.7.0

  # Navigation
  go_router: ^14.2.0

  # Local database
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0  # includes native binaries for iOS & Android
  path_provider: ^2.1.3       # required by Isar for DB path resolution

  # Code generation helpers
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Crypto — password hashing (SHA-256 + salt)
  crypto: ^3.0.3

  # Utilities
  uuid: ^4.4.0

  # Image loading
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1

  # Typography
  google_fonts: ^6.2.1

  # Shimmer loading effect
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # Testing
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

  # Code generators
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  isar_generator: ^3.1.0

flutter:
  uses-material-design: true
  generate: true
  generate: true
