name: flutter_casino_platform
description: A local-first Flutter casino platform — clean architecture, Velvet & Gold design system, BLoC state management.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  intl: ^0.20.2

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  # Dependency injection
  get_it: ^9.2.1

  # Navigation
  go_router: ^17.1.0

  # Local database — SQLite via sqflite, no code generation required
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5

  # Crypto — SHA-256 password hashing with random salt
  crypto: ^3.0.7

  # Utilities
  uuid: ^4.5.3

  # Image loading
  cached_network_image: ^3.4.1

  # Typography
  google_fonts: ^8.0.2

  # Shimmer loading effect
  shimmer: ^3.0.0

  # SVG rendering
  flutter_svg: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
